<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messenger</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: Arial, sans-serif;
    max-width: 600px;
    margin: 0 auto;
    padding: 12px;
    background: #f0f2f5;
  }
  h2 { text-align: center; margin: 10px 0 15px; color: #333; }
  label { font-weight: bold; display: block; margin-top: 12px; margin-bottom: 5px; font-size: 14px; }
  textarea {
    width: 100%;
    padding: 10px;
    font-size: 15px;
    border: 1px solid #ccc;
    border-radius: 6px;
    background: white;
  }
  .btnrow {
    display: flex;
    gap: 8px;
    margin-top: 14px;
  }
  button {
    flex: 1;
    padding: 13px;
    font-size: 15px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    color: white;
    transition: opacity 0.2s;
  }
  button:active { opacity: 0.8; }
  #addBtn { background: #2563eb; }
  #clearBtn { background: #6b7280; }

  .stats {
    display: flex;
    justify-content: space-between;
    margin: 15px 0 8px;
    font-size: 14px;
    font-weight: bold;
    gap: 6px;
  }
  .stats span { flex: 1; text-align: center; padding: 6px 4px; border-radius: 4px; }
  .stat-orange { background: #fff3cd; color: #856404; }
  .stat-green { background: #d4edda; color: #155724; }

  #output {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-top: 10px;
  }
  .row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 12px;
    border-radius: 6px;
    border: 1px solid #ddd;
    font-size: 15px;
    transition: background 0.2s;
  }
  .row.pending { background: #fff8e1; }
  .row.sent { background: #d4edda; }

  .row .num { font-family: monospace; font-weight: bold; }
  .row a {
    padding: 6px 16px;
    border-radius: 4px;
    text-decoration: none;
    font-size: 13px;
    font-weight: bold;
    background: #25D366;
    color: white;
  }
  .row.sent a { background: #6c757d; pointer-events: none; }

  /* Account picker overlay */
  #accountPicker {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  #accountPicker .box {
    background: white;
    border-radius: 10px;
    padding: 24px;
    width: 85%;
    max-width: 360px;
    text-align: center;
  }
  #accountPicker h3 { margin-top: 0; }
  #accountPicker .opt {
    display: block;
    width: 100%;
    padding: 16px;
    margin: 10px 0;
    font-size: 17px;
    font-weight: bold;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    color: white;
  }
  #accountPicker .opt1 { background: #128C7E; }
  #accountPicker .opt2 { background: #25D366; }

  .currentAccount {
    text-align: center;
    font-size: 13px;
    color: #555;
    margin-bottom: 8px;
  }
  .currentAccount span {
    font-weight: bold;
    text-decoration: underline;
    cursor: pointer;
  }
</style>
</head>
<body>

<div id="accountPicker">
  <div class="box">
    <h3>Kaunsa account use karna hai?</h3>
    <button class="opt opt1" onclick="selectAccount(1)">Account 1 (76)</button>
    <button class="opt opt2" onclick="selectAccount(2)">Account 2 (65)</button>
  </div>
</div>

<h2>Messenger</h2>

<div class="currentAccount">Account: <span id="currentAccLabel" onclick="openPicker()">-</span> (badalne ke liye tap karo)</div>

<label for="msg">Message</label>
<textarea id="msg" rows="5"></textarea>

<label for="numbers">Numbers (ek line mein ek number)</label>
<textarea id="numbers" rows="6" placeholder="9876543210
9123456780
9988776655"></textarea>

<div class="btnrow">
  <button id="addBtn" onclick="addNumbers()">List</button>
  <button id="clearBtn" onclick="resetAll()">Clear</button>
</div>

<div class="stats" id="stats" style="display:none;">
  <span class="stat-orange" id="pendingCount">Pending: 0</span>
  <span class="stat-green" id="sentCount">Sent: 0</span>
</div>

<div id="output"></div>

<script>
const STORAGE_KEY_76 = 'wa_bulk_sender_data_76';
const STORAGE_KEY_65 = 'wa_bulk_sender_data_65';

let currentAccount = null; // 1 or 2
let entries = [];

function storageKey() {
  return currentAccount === 1 ? STORAGE_KEY_76 : STORAGE_KEY_65;
}

function openPicker() {
  document.getElementById('accountPicker').style.display = 'flex';
}

function selectAccount(acc) {
  currentAccount = acc;
  document.getElementById('accountPicker').style.display = 'none';
  document.getElementById('currentAccLabel').textContent = acc === 1 ? 'Account 1 (76)' : 'Account 2 (65)';
  loadData();
  render();
}

function loadData() {
  try {
    const saved = localStorage.getItem(storageKey());
    if (saved) {
      const data = JSON.parse(saved);
      entries = data.entries || [];
      document.getElementById('msg').value = data.msg || '';
    } else {
      entries = [];
      document.getElementById('msg').value = '';
    }
  } catch (e) {
    entries = [];
  }
}

function saveData() {
  const data = {
    entries: entries,
    msg: document.getElementById('msg').value
  };
  localStorage.setItem(storageKey(), JSON.stringify(data));
}

function addNumbers() {
  const numbersRaw = document.getElementById('numbers').value;
  const lines = numbersRaw.split('\n').map(l => l.trim()).filter(l => l.length > 0);

  if (lines.length === 0) {
    alert('Numbers daalo upar.');
    return;
  }

  let added = 0;
  lines.forEach(line => {
    let num = line.replace(/[^0-9]/g, '');
    if (num.length === 10) num = '91' + num;

    const alreadyExists = entries.some(e => e.num === num);
    if (!alreadyExists) {
      entries.push({ num: num, status: 'pending' });
      added++;
    }
  });

  document.getElementById('numbers').value = '';
  saveData();
  render();

  if (added < lines.length) {
    alert(added + ' naye numbers jode gaye. ' + (lines.length - added) + ' already list mein the.');
  }
}

function render() {
  const msg = document.getElementById('msg').value.trim();
  const output = document.getElementById('output');
  output.innerHTML = '';

  entries.forEach((entry, idx) => {
    const encodedMsg = encodeURIComponent(msg);
    const url = 'https://wa.me/' + entry.num + '?text=' + encodedMsg;

    const row = document.createElement('div');
    row.className = 'row ' + entry.status;

    const label = document.createElement('span');
    label.className = 'num';
    label.textContent = (idx + 1) + '. ' + entry.num;

    const sendLink = document.createElement('a');
    sendLink.href = url;
    sendLink.target = '_blank';
    sendLink.textContent = entry.status === 'sent' ? 'Sent' : 'Send';
    sendLink.onclick = function() {
      if (entry.status === 'pending') {
        entry.status = 'sent';
        saveData();
        render();
      }
    };

    row.appendChild(label);
    row.appendChild(sendLink);
    output.appendChild(row);
  });

  updateStats();
}

function updateStats() {
  const stats = document.getElementById('stats');
  if (entries.length === 0) {
    stats.style.display = 'none';
    return;
  }
  stats.style.display = 'flex';

  const pending = entries.filter(e => e.status === 'pending').length;
  const sent = entries.filter(e => e.status === 'sent').length;

  document.getElementById('pendingCount').textContent = 'Pending: ' + pending;
  document.getElementById('sentCount').textContent = 'Sent: ' + sent;
}

function resetAll() {
  if (entries.length > 0 && !confirm('Sab list aur status delete ho jayega. Sure?')) return;
  entries = [];
  document.getElementById('numbers').value = '';
  localStorage.removeItem(storageKey());
  document.getElementById('output').innerHTML = '';
  document.getElementById('stats').style.display = 'none';
}

document.getElementById('msg').addEventListener('input', saveData);
</script>

</body>
</html>
