<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatsApp Bulk Sender</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: Arial, sans-serif;
    max-width: 600px;
    margin: 0 auto;
    padding: 12px;
    background: #f0f2f5;
  }
  h2 { text-align: center; margin: 10px 0 15px; }
  label { font-weight: bold; display: block; margin-top: 12px; margin-bottom: 5px; font-size: 14px; }
  textarea {
    width: 100%;
    padding: 10px;
    font-size: 15px;
    border: 1px solid #ccc;
    border-radius: 6px;
  }
  .btnrow {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }
  button {
    flex: 1;
    padding: 12px;
    font-size: 15px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    color: white;
  }
  #genBtn { background: #25D366; }
  #resetBtn { background: #888; }

  .stats {
    display: flex;
    justify-content: space-between;
    margin: 15px 0 8px;
    font-size: 14px;
    font-weight: bold;
  }
  .stats span { padding: 4px 8px; border-radius: 4px; }
  .stat-orange { background: #fff3cd; color: #856404; }
  .stat-green { background: #d4edda; color: #155724; }
  .stat-red { background: #f8d7da; color: #721c24; }

  #output {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-top: 10px;
    max-height: 60vh;
    overflow-y: auto;
  }
  .row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 12px;
    border-radius: 6px;
    border: 1px solid #ddd;
    font-size: 15px;
    transition: background 0.2s;
  }
  .row.pending { background: #fff8e1; }
  .row.sent { background: #d4edda; }
  .row.failed { background: #f8d7da; }

  .row .num { font-family: monospace; font-weight: bold; }
  .row .actions { display: flex; gap: 6px; }
  .row a, .row button.markfail {
    padding: 6px 12px;
    border-radius: 4px;
    text-decoration: none;
    font-size: 13px;
    font-weight: bold;
    border: none;
    cursor: pointer;
  }
  .row a { background: #25D366; color: white; }
  .row.sent a { background: #6c757d; pointer-events: none; }
  .row button.markfail { background: #dc3545; color: white; }
  .row.failed button.markfail { background: #6c757d; pointer-events: none; }

  .note { font-size: 12px; color: #777; margin-top: 12px; text-align: center; }
</style>
</head>
<body>

<h2>WhatsApp Bulk Sender</h2>

<label for="msg">Message (har baar edit kar sakte ho)</label>
<textarea id="msg" rows="5">Namaste, BSc/BCom/BCA ka result aa chuka hai. Form filling/supplementary form ke liye apply kare. Dhanyawad - MP Online</textarea>

<label for="numbers">Numbers (ek line mein ek number, 10-digit)</label>
<textarea id="numbers" rows="8" placeholder="9876543210
9123456780
9988776655"></textarea>

<div class="btnrow">
  <button id="genBtn" onclick="generateLinks()">List Banao</button>
  <button id="resetBtn" onclick="resetAll()">Reset</button>
</div>

<div class="stats" id="stats" style="display:none;">
  <span class="stat-orange" id="pendingCount">Pending: 0</span>
  <span class="stat-green" id="sentCount">Sent: 0</span>
  <span class="stat-red" id="failedCount">Failed: 0</span>
</div>

<div id="output"></div>

<p class="note">Send pe tap karo → WhatsApp khulega, message likha milega → Enter dabao → wapas aao to wo row green ho jayega. Agar WhatsApp na chale to "Fail" dabao, row red ho jayega.</p>

<script>
let entries = [];

function generateLinks() {
  const numbersRaw = document.getElementById('numbers').value;
  const lines = numbersRaw.split('\n').map(l => l.trim()).filter(l => l.length > 0);

  if (lines.length === 0) {
    alert('Numbers daalo upar.');
    return;
  }

  entries = lines.map(line => {
    let num = line.replace(/[^0-9]/g, '');
    if (num.length === 10) num = '91' + num;
    return { num: num, status: 'pending' };
  });

  render();
}

function render() {
  const msg = document.getElementById('msg').value.trim();
  const output = document.getElementById('output');
  output.innerHTML = '';

  entries.forEach((entry, idx) => {
    const url = 'https://wa.me/' + entry.num + '?text=' + encodeURIComponent(msg);

    const row = document.createElement('div');
    row.className = 'row ' + entry.status;

    const label = document.createElement('span');
    label.className = 'num';
    label.textContent = (idx + 1) + '. ' + entry.num;

    const actions = document.createElement('div');
    actions.className = 'actions';

    const sendLink = document.createElement('a');
    sendLink.href = url;
    sendLink.target = '_blank';
    sendLink.textContent = entry.status === 'sent' ? 'Sent' : 'Send';
    sendLink.onclick = function() {
      if (entry.status === 'pending') {
        entry.status = 'sent';
        render();
        updateStats();
      }
    };

    const failBtn = document.createElement('button');
    failBtn.className = 'markfail';
    failBtn.textContent = entry.status === 'failed' ? 'Failed' : 'Fail';
    failBtn.onclick = function() {
      if (entry.status !== 'sent') {
        entry.status = entry.status === 'failed' ? 'pending' : 'failed';
        render();
        updateStats();
      }
    };

    actions.appendChild(sendLink);
    actions.appendChild(failBtn);

    row.appendChild(label);
    row.appendChild(actions);
    output.appendChild(row);
  });

  updateStats();
}

function updateStats() {
  const stats = document.getElementById('stats');
  if (entries.length === 0) {
    stats.style.display = 'none';
    return;
  }
  stats.style.display = 'flex';

  const pending = entries.filter(e => e.status === 'pending').length;
  const sent = entries.filter(e => e.status === 'sent').length;
  const failed = entries.filter(e => e.status === 'failed').length;

  document.getElementById('pendingCount').textContent = 'Pending: ' + pending;
  document.getElementById('sentCount').textContent = 'Sent: ' + sent;
  document.getElementById('failedCount').textContent = 'Failed: ' + failed;
}

function resetAll() {
  if (entries.length > 0 && !confirm('Sab status reset ho jayega. Sure?')) return;
  entries = [];
  document.getElementById('output').innerHTML = '';
  document.getElementById('stats').style.display = 'none';
}
</script>

</body>
</html>
