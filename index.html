<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatsApp Messenger</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f4f4;
    padding:20px;
}

.container{
    max-width:700px;
    margin:auto;
    background:#fff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    margin-bottom:20px;
}

label{
    display:block;
    font-size:18px;
    font-weight:bold;
    margin-top:15px;
    margin-bottom:8px;
}

textarea{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:8px;
    resize:none;
    font-size:16px;
}

#message{
    height:120px;
}

#numbers{
    height:120px;
}

.buttons{
    display:flex;
    gap:10px;
    margin-top:15px;
}

button{
    flex:1;
    padding:12px;
    border:none;
    border-radius:8px;
    color:#fff;
    font-size:18px;
    cursor:pointer;
}

.list-btn{
    background:#2563eb;
}

.clear-btn{
    background:#6b7280;
}

.status{
    display:flex;
    gap:10px;
    margin-top:15px;
}

.status div{
    flex:1;
    padding:10px;
    text-align:center;
    border-radius:8px;
    font-size:18px;
    font-weight:bold;
}

.pending{
    background:#fef3c7;
}

.sent{
    background:#d1fae5;
}

.item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px;
    margin-top:10px;
    background:#fefce8;
    border-radius:8px;
}

.send-btn{
    background:#22c55e;
    width:100px;
}

select{
    width:100%;
    padding:12px;
    border-radius:8px;
    border:1px solid #ccc;
    font-size:16px;
}
</style>
</head>
<body>

<div class="container">

<h1>Messenger</h1>

<label>Message</label>
<textarea id="message" placeholder="Message likho..."></textarea>

<label>Message bhejne wala Number</label>
<select id="senderNumber">
    <option value="7067305467">7067305467</option>
    <option value="9203779980">9203779980</option>
</select>

<label>Numbers (ek line mein ek number)</label>
<textarea id="numbers" placeholder="9876543210&#10;9123456780"></textarea>

<div class="buttons">
    <button class="list-btn" onclick="createList()">List</button>
    <button class="clear-btn" onclick="clearAll()">Clear</button>
</div>

<div class="status">
    <div class="pending">Pending: <span id="pending">0</span></div>
    <div class="sent">Sent: <span id="sent">0</span></div>
</div>

<div id="listContainer"></div>

</div>

<script>

let sentCount = 0;

function createList(){

    let numbers = document.getElementById("numbers")
    .value
    .split("\n")
    .filter(n => n.trim() !== "");

    document.getElementById("pending").innerText = numbers.length;

    let container = document.getElementById("listContainer");
    container.innerHTML = "";

    numbers.forEach((num,index)=>{

        let div = document.createElement("div");
        div.className = "item";

        div.innerHTML = `
            <b>${index+1}. ${num}</b>
            <button class="send-btn"
            onclick="sendMessage('${num}',this)">
            Send
            </button>
        `;

        container.appendChild(div);
    });
}

function sendMessage(number,btn){

    let msg = document.getElementById("message").value;
    let sender = document.getElementById("senderNumber").value;

    if(msg.trim()==""){
        alert("Pehle Message Likho");
        return;
    }

    let whatsappURL =
    `https://wa.me/91${number}?text=${encodeURIComponent(
        "From: " + sender + "\n\n" + msg
    )}`;

    window.open(whatsappURL,"_blank");

    btn.disabled = true;
    btn.innerText = "Sent";

    sentCount++;

    let pending =
    parseInt(document.getElementById("pending").innerText)-1;

    document.getElementById("pending").innerText = pending;
    document.getElementById("sent").innerText = sentCount;
}

function clearAll(){
    document.getElementById("message").value = "";
    document.getElementById("numbers").value = "";
    document.getElementById("listContainer").innerHTML = "";
    document.getElementById("pending").innerText = "0";
    document.getElementById("sent").innerText = "0";
    sentCount = 0;
}
</script>

</body>
</html>
